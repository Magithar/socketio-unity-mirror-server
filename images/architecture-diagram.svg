<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 740 456" width="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
        </marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#f2ede4"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.6"/>

      <!-- ── ARROWS (drawn before boxes) ── -->

      <!-- WIN → KCP (client connection, link blue) -->
      <line x1="188" y1="166" x2="280" y2="166"
            stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <rect x="204" y="152" width="60" height="12" rx="2" fill="#f2ede4"/>
      <text x="234" y="161" fill="#2563eb" font-size="8"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.06em">KCP / UDP</text>

      <!-- WGL → SWT (client connection, link blue) -->
      <line x1="188" y1="294" x2="280" y2="294"
            stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <rect x="212" y="280" width="32" height="12" rx="2" fill="#f2ede4"/>
      <text x="228" y="289" fill="#2563eb" font-size="8"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.06em">WSS</text>

      <!-- MX → KCP (internal routing, muted) -->
      <line x1="536" y1="208" x2="440" y2="172"
            stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- MX → SWT (internal routing, muted) -->
      <line x1="536" y1="244" x2="440" y2="288"
            stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- ── SERVER BOUNDARY ── -->
      <rect x="260" y="64" width="456" height="320" rx="8"
            fill="rgba(28,25,23,0.02)" stroke="rgba(28,25,23,0.20)"
            stroke-width="1" stroke-dasharray="5,4"/>
      <!-- Boundary label on a paper mask -->
      <rect x="288" y="56" width="228" height="16" rx="2" fill="#f2ede4"/>
      <text x="402" y="67" fill="#78716c" font-size="9"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">MIRROR SERVER · LINUX · EDGEGAP</text>

      <!-- ── NODE BOXES ── -->

      <!-- Windows/Mac Client (input type) -->
      <rect x="40" y="132" width="148" height="68" rx="6" fill="#faf7f2"/>
      <rect x="40" y="132" width="148" height="68" rx="6"
            fill="rgba(120,113,108,0.10)" stroke="#78716c" stroke-width="1"/>
      <rect x="48" y="138" width="36" height="12" rx="2"
            fill="transparent" stroke="rgba(120,113,108,0.40)" stroke-width="0.8"/>
      <text x="66" y="147" fill="rgba(120,113,108,0.8)" font-size="7"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">CLIENT</text>
      <text x="114" y="168" fill="#1c1917" font-size="12" font-weight="600"
            font-family="'Geist', sans-serif" text-anchor="middle">Windows / Mac</text>
      <text x="114" y="184" fill="#78716c" font-size="9"
            font-family="'Geist Mono', monospace" text-anchor="middle">GitHub Releases</text>

      <!-- WebGL Client (input type) -->
      <rect x="40" y="260" width="148" height="68" rx="6" fill="#faf7f2"/>
      <rect x="40" y="260" width="148" height="68" rx="6"
            fill="rgba(120,113,108,0.10)" stroke="#78716c" stroke-width="1"/>
      <rect x="48" y="266" width="36" height="12" rx="2"
            fill="transparent" stroke="rgba(120,113,108,0.40)" stroke-width="0.8"/>
      <text x="66" y="275" fill="rgba(120,113,108,0.8)" font-size="7"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">CLIENT</text>
      <text x="114" y="296" fill="#1c1917" font-size="12" font-weight="600"
            font-family="'Geist', sans-serif" text-anchor="middle">WebGL</text>
      <text x="114" y="312" fill="#78716c" font-size="9"
            font-family="'Geist Mono', monospace" text-anchor="middle">GitHub Pages</text>

      <!-- KcpTransport (backend type) -->
      <rect x="280" y="132" width="160" height="68" rx="6" fill="#faf7f2"/>
      <rect x="280" y="132" width="160" height="68" rx="6"
            fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <rect x="288" y="138" width="48" height="12" rx="2"
            fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="312" y="147" fill="rgba(28,25,23,0.8)" font-size="7"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">TRANSPORT</text>
      <text x="360" y="168" fill="#1c1917" font-size="12" font-weight="600"
            font-family="'Geist', sans-serif" text-anchor="middle">KcpTransport</text>
      <text x="360" y="184" fill="#78716c" font-size="9"
            font-family="'Geist Mono', monospace" text-anchor="middle">:7777 / udp</text>

      <!-- SimpleWebTransport (backend type) -->
      <rect x="280" y="260" width="160" height="68" rx="6" fill="#faf7f2"/>
      <rect x="280" y="260" width="160" height="68" rx="6"
            fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
      <rect x="288" y="266" width="48" height="12" rx="2"
            fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
      <text x="312" y="275" fill="rgba(28,25,23,0.8)" font-size="7"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">TRANSPORT</text>
      <text x="360" y="296" fill="#1c1917" font-size="12" font-weight="600"
            font-family="'Geist', sans-serif" text-anchor="middle">SimpleWebTransport</text>
      <text x="360" y="312" fill="#78716c" font-size="9"
            font-family="'Geist Mono', monospace" text-anchor="middle">:7778 / wss</text>

      <!-- MultiplexTransport (FOCAL — primary router) -->
      <rect x="536" y="192" width="148" height="68" rx="6" fill="#faf7f2"/>
      <rect x="536" y="192" width="148" height="68" rx="6"
            fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <rect x="544" y="198" width="36" height="12" rx="2"
            fill="transparent" stroke="rgba(181,82,58,0.40)" stroke-width="0.8"/>
      <text x="562" y="207" fill="rgba(181,82,58,0.8)" font-size="7"
            font-family="'Geist Mono', monospace" text-anchor="middle"
            letter-spacing="0.08em">ROUTER</text>
      <text x="610" y="228" fill="#1c1917" font-size="12" font-weight="600"
            font-family="'Geist', sans-serif" text-anchor="middle">MultiplexTransport</text>
      <text x="610" y="244" fill="#78716c" font-size="9"
            font-family="'Geist Mono', monospace" text-anchor="middle">routes by client type</text>

      <!-- ── LEGEND ── -->
      <line x1="32" y1="400" x2="708" y2="400"
            stroke="rgba(28,25,23,0.10)" stroke-width="0.8"/>
      <text x="32" y="416" fill="#57534e" font-size="8"
            font-family="'Geist Mono', monospace" letter-spacing="0.14em">LEGEND</text>

      <line x1="96" y1="412" x2="120" y2="412"
            stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <text x="128" y="416" fill="#57534e" font-size="8"
            font-family="'Geist Mono', monospace">CLIENT CONNECTION</text>

      <line x1="296" y1="412" x2="320" y2="412"
            stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
      <text x="328" y="416" fill="#57534e" font-size="8"
            font-family="'Geist Mono', monospace">INTERNAL ROUTING</text>

      <rect x="492" y="404" width="12" height="12" rx="2"
            fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
      <text x="512" y="414" fill="#57534e" font-size="8"
            font-family="'Geist Mono', monospace">PRIMARY ROUTER</text>

      <rect x="624" y="404" width="20" height="12" rx="2"
            fill="rgba(28,25,23,0.02)" stroke="rgba(28,25,23,0.20)"
            stroke-width="1" stroke-dasharray="3,2"/>
      <text x="652" y="414" fill="#57534e" font-size="8"
            font-family="'Geist Mono', monospace">SERVER BOUNDARY</text>
    </svg>