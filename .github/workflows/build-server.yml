name: Dockerize & Push Mirror Server

# Trigger: publish a GitHub Release in this repo with a Linux server zip attached.
# Asset must be named: server-linux.zip
# Zip must contain the Unity Linux dedicated server build at its root.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to pull server build from (e.g. v1.0.0)
        required: true

jobs:
  build-and-push:
    name: Build Docker image and push to Edgegap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download server build from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.event.release.tag_name || inputs.tag }}
          gh release download "$TAG" --pattern "server-linux.zip" --dir /tmp/server
          mkdir -p build
          unzip /tmp/server/server-linux.zip -d build/
          chmod +x build/*.x86_64

      - name: Log in to Edgegap registry
        uses: docker/login-action@v3
        with:
          registry: registry.edgegap.com
          username: ${{ secrets.EDGEGAP_REGISTRY_USER }}
          password: ${{ secrets.EDGEGAP_REGISTRY_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            registry.edgegap.com/${{ secrets.EDGEGAP_ORG }}/mirror-server:${{ github.event.release.tag_name || inputs.tag }}
            registry.edgegap.com/${{ secrets.EDGEGAP_ORG }}/mirror-server:latest
